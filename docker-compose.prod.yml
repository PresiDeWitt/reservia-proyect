services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
    restart: unless-stopped

  frontend:
    image: ghcr.io/presidewitt/reservia-frontend:latest
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/presidewitt/reservia-backend:latest
    env_file: .env
    environment:
      DEBUG: "False"
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - db_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  caddy_data:
  caddy_config:
