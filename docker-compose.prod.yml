services:
  frontend:
    image: ghcr.io/presidewitt/reservia-frontend:latest
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/presidewitt/reservia-backend:latest
    env_file: .env
    environment:
      DEBUG: "False"
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"
      # Garantiza que el rate-limit de DRF use Redis (no LocMemCache por-proceso).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Opt-in a PostgreSQL: vacío => sigue usando SQLite (DB_PATH). Para activar
      # Postgres, migrar datos y definir DATABASE_URL en .env + usar el override
      # docker-compose.postgres.yml. Ver docs/PLAN_REMEDIACION_AUDITORIA_2026-05-29.md.
      DATABASE_URL: ${DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - db_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
