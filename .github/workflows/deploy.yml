name: Deploy to Production

on:
  # Triggers after CI passes on main — only deploys, never runs on PR branches
  workflow_run:
    workflows: ["CI - Lint, Unit Tests and SAST"]
    types: [completed]
    branches: [main]
  # Manual deploy / rollback: pass a specific image tag (SHA) or leave blank for latest
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (git short-SHA or 'latest')"
        required: false
        default: "latest"

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    # workflow_run: only proceed if CI succeeded. workflow_dispatch: always allow.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run provides the triggering SHA; workflow_dispatch uses current HEAD
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend — metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/reservia-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Backend — build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend — metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/reservia-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Frontend — build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/reservia
            sudo chown -R "$(whoami)":"$(whoami)" /opt/reservia
            cd /opt/reservia
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
